<!-- Implement an event listener that triggers an alert when a button with the ID
"myButton" is clicked on a web page. -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="myButton">myButton</button>
</body>

<script>
    const b1=document.getElementById("myButton");
    b1.addEventListener("click",()=>{
        alert("hello");
    })
</script>
</html>
