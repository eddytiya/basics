<!-- Implement an event listener that triggers an alert showing the number of items
added to the cart when a button with the ID "addToCart" is clicked. Track the item
count in local storage. -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="b1">addToCart</button>
</body>

<script>
    const b1=document.getElementById("b1")
    b1.addEventListener("click",()=>{
        let count=localStorage.getItem("counting");

        if(count===null){
            count=0;
        }else{
            count=parseInt(count);
        }
        count++;

        localStorage.setItem("counting",count)

        alert (count)
    })
</script>
</html>
