<!-- // Write JavaScript to create a new <li> element representing a product name, set its
// text content, and append it to an existing <ul> of products. Store the product name
// in local storage -->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="data">
    <button id="b1">add</button>

    <ul id="ul">
        <li>apple</li>
        <li>banana</li>
        <li>grapes</li>
    </ul>
</body>

<script>
    const b1=document.getElementById("b1");
    b1.addEventListener("click",()=>{
        const data=document.getElementById("data").value

        const ul=document.getElementById("ul")
        const li=document.createElement("li")

        li.textContent=data
        ul.appendChild(li)

        localStorage.setItem("new LI",data)
    })
</script>
</html>
