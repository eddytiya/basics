<!-- Create a new button "clearButton" that, when clicked, clears the click count from
local storage and resets the counter. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>count: <span id="count">0</span></p>
    <p><span><button onclick="inc()">increment</button></span>
        <span><button onclick="dec()">decrment</button></span>
            <span><button onclick="cleardata()">reset</button></span></p>
</body>


<script>
    let count=0;

    function inc(){
        document.getElementById("count").innerHTML=count++;
        localStorage.setItem("count",count)
    }
    function dec(){
        document.getElementById("count").innerHTML=count--;
        localStorage.setItem("count",count)
    }
    function cleardata(){
        document.getElementById("count").innerHTML=count=0;
        localStorage.setItem("count",count)
    }
</script>
</html>
