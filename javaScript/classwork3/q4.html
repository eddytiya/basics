<!-- Create a form with fields for name, email, and password. Using JavaScript,
implement client-side validation for the following criteria:
a. Name: Should contain only alphabetic characters.
b. Email: Should match a valid email format.
c. Password: Should have a minimum length of 8 characters, including at least
one uppercase letter, one lowercase letter, and one digit.
d. After validating the form, store the name and email in local storage -->
<!-- a. Name: Is not empty and contains only alphabetic characters.
b. Email: Matches a valid email format.
c. Query: Is not empty and less than 1000 characters.
d. After validation, store the name, email, and query in local storage -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form onsubmit="return validator()">
        <p><span>name:</span>
        <input type="text" name="" id="name"></p>

        <p><span>email:</span>
        <input type="text" name="" id="email"></p>

        <p><span>password:</span>
        <input type="text" name="" id="password"></p>

        <p><span>query</span>
        <textarea name="" id="query"></textarea></p>

        <button id="b1">submit</button>
    </form>
</body>

<script>
    function validator(){
        let name =document.getElementById("name").value.trim();
        let email =document.getElementById("email").value.trim();
        let password =document.getElementById("password").value;
        let query=document.getElementById("query").value.trim()

        //regex

        let nameregex=/^[A-Za-z]+$/;
        let emailregex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        let passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
        
        if(name==""){
            alert("name cannot be empty")
            return false;
        }
        if(!nameregex.test(name)){
            alert("name should only contain alphabets")
            return false;
        }

        if(!emailregex.test(email)){
            alert("should match the matching format for email")
            return false;
        }
        if(password.length<8){
            alert("should not be more than 8 chars in length")
            return false;
        }

        if(!passwordRegex.test(password)){
            alert("password should match the appropriate format")
            return false;
        }
        
        if(query==""){
            alert("cannot be empty")
            return false;
        }
        if(query.length<1000){
            alert("cannot be more than 1000 words")
        }
        localStorage.setItem("name",name)
        localStorage.setItem("email",email)

        
        alert("updated and stored in the local storage")
        return true;
    }
</script>
</html>
