<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            text-align: center;
            font-weight: bold;
            font-size: 36px;
            font-style: normal;
            color: #333;
            margin-bottom: 30px;
            transition: all 0.3s;
        }

        h1:hover {
            text-decoration: underline wavy;
            font-style: italic;
        }

        table {
            width: 80%;
            margin: 0 auto 50px auto;
            padding: 10px;
            border-collapse: collapse;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 16px;
            font-weight: 500;
            background-color: #fff;
            border: 1px solid #000;
            border-radius: 10px;
        }

        th {

            padding: 12px 20px;
            border: 1px solid #000;
            text-decoration: underline;
            text-transform: uppercase;
            font-style: italic;
            background-color: #f0e68c;
            border-radius: 10px;
        }

        td {
            padding: 10px 15px;
            border: 1px solid #000;
            text-align: center;
            transition: all 0.3s;
        }

        tr:nth-child(odd) td {
            border-radius: 10px;
        }

        tr:nth-child(odd) {
            background-color: #d1e7dd;
        }

        tr:nth-child(even) {
            background-color: #add8e6;
        }

        tr:hover td {
            font-style: italic;
            text-decoration: overline underline;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <h1>Student Details</h1>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Course</th>
                <th>Grade</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Aditya Apathak</td>
                <td>20</td>
                <td>Mathematics</td>
                <td>A</td>
            </tr>
            <tr>
                <td>Erling Haaland</td>
                <td>22</td>
                <td>Physics</td>
                <td>B+</td>
            </tr>
            <tr>
                <td>Lamine Yalal</td>
                <td>21</td>
                <td>Chemistry</td>
                <td>A-</td>
            </tr>
            <tr>
                <td>Robert Lewandowski</td>
                <td>23</td>
                <td>Biology</td>
                <td>B</td>
            </tr>
            <tr>
                <td>Ouseman Dembele</td>
                <td>20</td>
                <td>Computer Science</td>
                <td>A+</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
