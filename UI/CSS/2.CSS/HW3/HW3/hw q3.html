<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .d1{
           font-size: 16px;
           height: 200px;
           width: 100%;
           background-color: aqua;
           display: flex;
           flex-direction: row;
           
           
        }
        .b1{
            height: 30px;
            width: 30px;
            background-color: black;
            color: aliceblue;
            padding: 2px;
            margin: 10px;
            

        }
        @media(min-width:768px){
            .d1{
                font-size: 50px;
            }
        }
        
        @media(max-width:480px){
            .d1{
                font-size: 5px;
            }
        }
        @media(max-width:600px){
            .d1{
               display: flex;
              flex-direction: column;
            }
        }

    </style>
</head>
<body>
    <div class="d1">Hello CSS
        <div class="b1"></div>
        <div class="b1"></div>
    </div>
</body>
</html>
