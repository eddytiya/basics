<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        /* Background image covering entire page */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Verdana', sans-serif;
            background: url('https://images.unsplash.com/photo-1549924231-f129b911e442?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
        }

        /* Centering the form */
        .login-form {
            width: 350px;
            margin: 100px auto;
            padding: 30px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Form heading */
        .login-form h2 {
            font-family: 'Georgia', serif;
            font-weight: bold;
            font-size: 28px;
            text-decoration: underline;
            margin-bottom: 20px;
            color: #333;
        }

        /* Labels styling */
        .login-form label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 16px;
            text-transform: uppercase;
        }

        /* Input fields styling */
        .login-form input[type="text"],
        .login-form input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 20px;
            border: 1px solid #333;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Verdana', sans-serif;
        }

        /* Login button styling */
        .login-form button {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Verdana', sans-serif;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        /* Hover effect on login button */
        .login-form button:hover {
            background-color: #45a049;
        }

        /* Optional: hover pointer for entire form */
        .login-form:hover {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-form">
        <h2>Login</h2>
        <!-- Redirect to employee table page on submit -->
        <form action="employee_table.html" method="get">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
