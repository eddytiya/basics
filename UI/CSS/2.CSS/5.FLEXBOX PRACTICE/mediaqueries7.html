<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        video{
            height: auto;
            width: 100%;
            position: relative;
        }
        h1{
            position: absolute;
            z-index: 1;
        }
        .gm{
            display: block;
        }
        .gn{
            display: none;
        }
@media (prefers-color-scheme: light) {
    .gm{
        display: none;
    }
    .gn{
        display: block;
    }
    
}
    </style>
</head>
<body>
    <h1>good morning</h1>
    <video class="gm" src="allianz arena.webm" autoplay loop muted></video>
    <!-- <h1>good night</h1> -->
    <video class="gn" src="campnou.webm" autoplay loop muted></video>
</body>
</html>
