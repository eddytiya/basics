<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
      height: 100%;
      margin: 0;
      padding: 0;
        }
        body{
            background-image:url('https://img.freepik.com/premium-vector/painted-illustration-vector-wood-table-floor-beautiful-natural-green-leaf-abstract-blurred-bokeh-light-background_34266-1692.jpg');
            background-repeat: no-repeat;
      background-size: cover; /* stretches image to cover the full page */
      background-position: center; /* centers the image */
        }

        table{
            margin-left: 45%;
            margin-top: 10%;
            border-collapse:collapse ;
            border: 2px solid black;
        }
        td{
            padding: 8px 12px; /* some padding to make it look nicer */
      border-top: 2px solid black;
      border-bottom: 2px solid black;

        }

        tr:last-child td {
            border-bottom: none; 
        }
        tr:nth-child(even) {
      background-color: lightgreen /* light gray for even rows */
    }
    tr:nth-child(odd) {
      background-color: green; /* white for odd rows */
    }

    table:hover{
        cursor: pointer;
    }

    td:hover{       
        transform: scale(1.5);
        color: blue;
        background-color: black;

    }

    </style>



</head>
<body>
    <div>
        <table>
            <tr>
                <td>ID</td>
                <td>NAME</td>
                <td>SURNAME</td>
            </tr>
            <tr>
                <td>1</td>
                <td>Aditya</td>
                <td>Pathak</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Rohit</td>
                <td>Sharma</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Virat</td>
                <td>Kohli</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Shreyas</td>
                <td>Iyer</td>
            </tr>
            <tr>
                <td>5</td>
                <td>SuryaKumar</td>
                <td>Yadav</td>
            </tr>
            <tr>
                <td>6</td>
                <td>KL</td>
                <td>Rahul</td>
            </tr>
        </table>
    </div>
</body>
</html>
