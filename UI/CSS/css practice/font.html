<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil:opsz,wght@10..72,100..900&display=swap"
        rel="stylesheet">


    <style>
        body{
           
            height: 100vh;
            margin: 0;
            color: white; /* Text color for better visibility */
            
            

        }
        div{
            margin-top: 25%;
            margin-left: 40%;
        }
        h1 {
            font-family: "Big Shoulders Stencil", sans-serif;
        }
        p{
            font-size: larger;
            /*font-weight: bolder;*/
            font-style: italic;
            text-transform: capitalize;
            text-decoration:underline wavy ;
        }
        
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the video covers the full screen */
            z-index: -1; /* Places the video behind the content */
        
        }
    </style>
</head>

<body>
    <video autoplay loop muted plays-inline class="background">
        <source src="video.mp4" type="video/mp4">
    </video>
    <div>
    <h1>this is a header </h1>

</div>

</body>

</html>
